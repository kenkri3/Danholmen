<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking Widget Demo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f2ed;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      gap: 30px;
    }
    h1 {
      font-size: 24px;
      font-weight: 700;
      color: #1a1a1a;
    }
    p {
      font-size: 14px;
      color: #666;
      text-align: center;
      max-width: 500px;
    }
    .demo-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }
    .demo-section h2 {
      font-size: 16px;
      font-weight: 600;
      color: #333;
    }
    .demo-section code {
      background: #e8e5e0;
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 12px;
      font-family: 'Courier New', monospace;
      color: #444;
      max-width: 100%;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <h1>Booking Widget Demo</h1>
  <p>
    Denne siden demonstrerer hvordan booking-widgeten kan embeddes paa eksterne nettsider
    med en enkel script-tag. Skriptet laster widgeten inn i en iframe.
  </p>

  <div class="demo-section">
    <h2>Med forhandsvalgt badstue (Ormelet VEL)</h2>
    <code>&lt;script src="./widget.js" data-sauna="ormelet-vel"&gt;&lt;/script&gt;</code>
    <script src="./widget.js" data-sauna="ormelet-vel"></script>
  </div>

</body>
</html>
